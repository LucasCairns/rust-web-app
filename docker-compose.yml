services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    networks:
      - rust_web_app
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    command: start-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    networks:
      - rust_web_app
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: dev
    tmpfs:
      - /var/lib/postgresql/data

networks:
  rust_web_app:
